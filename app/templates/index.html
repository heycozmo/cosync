<!DOCTYPE html>
<html>
<head>
    <style>
    body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: #0f0f0f;
        color: white;
    }

    #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
    }

    #topbar {
        display: flex;
        justify-content: space-between;
        padding: 10px 20px;
        font-size: 14px;
        border-bottom: 1px solid #222;
    }

    #main {
        flex: 1;
        display: flex;
        justify-content: center;
        overflow: hidden;
    }

    #chat {
        width: 100%;
        max-width: 600px;
        padding: 20px;
        overflow-y: auto;
    }

    #input-area {
        padding: 15px;
        border-top: 1px solid #222;
        display: flex;
        justify-content: center;
    }

    #input-area-inner {
        display: flex;
        width: 100%;
        max-width: 600px;
        background: #1a1a1a;
        border-radius: 10px;
        padding: 5px;
    }

    #inputBox {
        flex: 1;
        background: transparent;
        border: none;
        color: white;
        padding: 10px;
        outline: none;
        resize: none;
        min-height: 40px;
        max-height: 120px;
        overflow-y: auto;
    }

    button {
        background: #2a2a2a;
        border: none;
        color: white;
        width: 40px;
        height: 40px;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
    }

    #status-container {
        display: flex;
        align-items: center;
        gap: 8px;
    }

    #status-ring {
        width: 18px;
        height: 18px;
        border-radius: 50%;

        border: 2px solid transparent;
        border-top: 3px solid #4caf50;
        border-left: 2px solid #4caf50;
        border-right: 2px solid #4caf50;
        border-bottom: 2px solid transparent;

        box-shadow: 0 0 6px rgba(76, 175, 80, 0.6);
        animation: spin 2.5s linear infinite;
        transition: all 0.3s ease;
    }

    @keyframes spin {
        from { transform: rotate(0deg); }
        to { transform: rotate(360deg); }
    }
</style>
<title>Cosync</title>
</head>
<body>
    <div id="app">

        <div id="topbar">
            <span>cosync</span>
            <div id="status-container">
                <div id="status-ring"></div>
            </div>
        </div>

        <div id="main">
            <div id="chat"></div>
        </div>

        <div id="input-area">
            <div id="input-area-inner">
                <textarea id="inputBox" placeholder="Type a command..." onkeydown="handleKey(event)"></textarea>
                <button onclick="sendCommand()">&#8594;</button>
            </div>
        </div>

    </div>

    <script>
        let messages = [];

        async function sendCommand() {
            updateStatus("thinking");

            const input = document.getElementById("inputBox").value;
            if (!input.trim()) return;

            document.getElementById("inputBox").value = "";

            messages.push({ type: "user", text: input });
            messages.push({ type: "assistant", text: "thinking..." });
            renderMessages();

            try {
                const res = await fetch("/command", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ input: input })
                });

                if (!res.ok) {
                    throw new Error("server error");
                }

                // let "thinking..." exist briefly
                await new Promise(r => setTimeout(r, 150));

                // reuse the thinking message
                let currentMessage = messages[messages.length - 1];

                const reader = res.body.getReader();
                const decoder = new TextDecoder();

                let started = false;

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);

                    // only clear "thinking..." when first chunk arrives
                    if (!started) {
                        currentMessage.text = "";
                        currentMessage.type = "assistant";
                        started = true;
                    }

                    currentMessage.text += chunk;
                    renderMessages();
                }

                updateStatus("idle");

            } catch (err) {
                console.error(err);

                messages.pop();
                messages.push({ 
                    type: "assistant", 
                    text: "cosync hit an error." 
                });

                updateStatus("error");
            }

    renderMessages();
}

        function handleKey(event) {
            if (event.key === "Enter" && !event.shiftKey) {
                event.preventDefault();
                sendCommand();
            }
        }

        function renderMessages() {
            const chat = document.getElementById("chat");
            chat.innerHTML = "";

            messages.forEach(msg => {
                const div = document.createElement("div");
                div.innerText = msg.text;
                div.style.marginBottom = "10px";
                div.style.maxWidth = "70%";

                if (msg.text === "thinking...") {
                    div.style.opacity = "0.6";
                    div.style.fontStyle = "italic";
                    div.style.marginRight = "auto";
                } else {
                    div.style.padding = "10px 14px";
                    div.style.borderRadius = "12px";

                    if (msg.type === "user") {
                        div.style.background = "#2a2a2a";
                        div.style.marginLeft = "auto";
                    } else {
                        div.style.background = "#1a1a1a";
                        div.style.marginRight = "auto";
                    }
                }

                chat.appendChild(div);
            });

            chat.scrollTop = chat.scrollHeight;
        }

        const inputBox = document.getElementById("inputBox");

        inputBox.addEventListener("input", () => {
            inputBox.style.height = "auto";
            inputBox.style.height = inputBox.scrollHeight + "px";
        });

        let status = "idle";

        function updateStatus(newStatus) {
            status = newStatus;

            const ring = document.getElementById("status-ring");

            let color;

            if (status === "idle") {
                color = "#4caf50";
                ring.style.borderWidth = "2px";
                ring.style.opacity = "1";
            } else if (status === "thinking") {
                color = "#ff9800";
                ring.style.borderWidth = "2px";
                ring.style.opacity = "0.9";
            } else if (status === "error") {
                color = "#f44336";
                ring.style.borderWidth = "2px";
                ring.style.opacity = "1";
            }

            ring.style.borderTopColor = color;
            ring.style.borderLeftColor = color;
            ring.style.borderRightColor = color;
            ring.style.borderBottomColor = "transparent";

            ring.style.boxShadow = `0 0 6px ${color}`;
        }
    </script>
</body>
</html>
